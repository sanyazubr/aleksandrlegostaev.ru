name: Passive security scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Scan the live site without active attacks
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874 # v0.15.0
        with:
          target: https://aleksandrlegostaev.ru/
          docker_name: ghcr.io/zaproxy/zaproxy:2.17.0
          cmd_options: -a -m 2
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-baseline-report
